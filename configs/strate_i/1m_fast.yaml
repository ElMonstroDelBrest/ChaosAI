patch:
  patch_length: 16
  stride: 16
  n_channels: 5
revin:
  eps: 1.0e-5
  affine: false
encoder:
  in_channels: 5
  hidden_channels: 128
  latent_dim: 64
  n_layers: 4
  dilation_base: 2
  kernel_size: 3
decoder:
  latent_dim: 64
  hidden_channels: 128
  out_channels: 5
  patch_length: 16
  n_layers: 4
  kernel_size: 3
codebook:
  num_codes: 1024
  latent_dim: 64
  ema_decay: 0.99
  eps: 1.0e-5
  dead_threshold: 2
  commitment_weight: 0.25
  fsq_levels: [8, 8, 8, 2]
loss:
  huber_delta: 1.0
  sdtw_alpha: 0.1
  sdtw_gamma: 0.1
  commitment_beta: 0.25
training:
  lr: 3.0e-4
  weight_decay: 1.0e-2
  max_epochs: 15
  warmup_epochs: 2
  patience: 5
  batch_size: 2048
  num_patches: 32
  precision: '32-true'
data:
  data_path: 'data/ohlcv_1m_subset/'
  val_split: 0.1
  num_workers: 8
