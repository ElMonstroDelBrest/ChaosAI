# Strate I config — Multi-source OHLCV (crypto + stocks + forex + commodities)
# Re-train the FSQ tokenizer on all asset classes so the codebook covers
# the full distribution (not just crypto 1min patterns)
#
# Data: 509M candles from 8650 assets across 7 source directories
# Training: 10 epochs should be sufficient (codebook converges fast)

patch:
  patch_length: 1
  stride: 1
  n_channels: 5

revin:
  eps: 1.0e-5
  affine: false

encoder:
  in_channels: 5
  hidden_channels: 128
  latent_dim: 64
  n_layers: 4
  dilation_base: 2
  kernel_size: 3

decoder:
  latent_dim: 64
  hidden_channels: 128
  out_channels: 5
  patch_length: 1
  n_layers: 4
  kernel_size: 3

codebook:
  num_codes: 1024
  latent_dim: 64
  ema_decay: 0.99
  eps: 1.0e-5
  dead_threshold: 2
  commitment_weight: 0.25
  fsq_levels: [8, 8, 8, 2]

loss:
  huber_delta: 1.0
  sdtw_alpha: 0.1
  sdtw_gamma: 0.1
  commitment_beta: 0.25

training:
  lr: 3.0e-4
  weight_decay: 1.0e-2
  max_epochs: 10
  warmup_epochs: 1
  patience: 5
  batch_size: 4096
  num_patches: 32
  precision: '32-true'

data:
  data_path: 'data/raw_1m_parquet;data/ohlcv_stocks_daily;data/ohlcv_sp500;data/ohlcv_forex;data/ohlcv_commodities;data/ohlcv_stocks_1h;data/ohlcv_crypto_yf'
  val_split: 0.1
  num_workers: 4
