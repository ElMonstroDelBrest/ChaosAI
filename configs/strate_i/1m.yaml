# Strate I config for 1-minute OHLCV data
# patch_length=16 → 16 minutes per patch (vs 16 hours in 1h mode)
# Larger batch for faster convergence on bigger dataset (~32M patches)

patch:
  patch_length: 16
  stride: 16
  n_channels: 5

revin:
  eps: 1.0e-5
  affine: false

encoder:
  in_channels: 5
  hidden_channels: 128
  latent_dim: 64
  n_layers: 4
  dilation_base: 2
  kernel_size: 3

decoder:
  latent_dim: 64
  hidden_channels: 128
  out_channels: 5
  patch_length: 16
  n_layers: 4
  kernel_size: 3

codebook:
  num_codes: 1024
  latent_dim: 64
  ema_decay: 0.99
  eps: 1.0e-5
  dead_threshold: 2
  commitment_weight: 0.25
  fsq_levels: [8, 8, 8, 2]  # FSQ — better fat-tail coverage, no codebook collapse

loss:
  huber_delta: 1.0
  sdtw_alpha: 0.1
  sdtw_gamma: 0.1
  commitment_beta: 0.25

training:
  lr: 3.0e-4
  weight_decay: 1.0e-2
  max_epochs: 30         # fewer epochs — 32M patches = huge dataset, converges fast
  warmup_epochs: 2
  patience: 10
  batch_size: 512        # larger batch for speed on CPU
  num_patches: 32
  precision: '32-true'   # CPU training — no mixed precision

data:
  data_path: 'data/ohlcv_1m/'
  val_split: 0.1         # 10% val — plenty of data
  num_workers: 4
