# Strate I config for 1-minute OHLCV data — patch_length=1
# Each patch = 1 single candle → ~520M patches (432 pairs × ~1.2M candles each)
# RevIN bypassed automatically when L=1 (var=0 degeneracy)
# Log-returns are already ~stationary, no per-patch normalization needed

patch:
  patch_length: 1
  stride: 1
  n_channels: 5

revin:
  eps: 1.0e-5
  affine: false

encoder:
  in_channels: 5
  hidden_channels: 128
  latent_dim: 64
  n_layers: 4
  dilation_base: 2
  kernel_size: 3

decoder:
  latent_dim: 64
  hidden_channels: 128
  out_channels: 5
  patch_length: 1
  n_layers: 4
  kernel_size: 3

codebook:
  num_codes: 1024
  latent_dim: 64
  ema_decay: 0.99
  eps: 1.0e-5
  dead_threshold: 2
  commitment_weight: 0.25
  fsq_levels: [8, 8, 8, 2]

loss:
  huber_delta: 1.0
  sdtw_alpha: 0.1
  sdtw_gamma: 0.1
  commitment_beta: 0.25

training:
  lr: 3.0e-4
  weight_decay: 1.0e-2
  max_epochs: 3
  warmup_epochs: 1
  patience: 2
  batch_size: 2048
  num_patches: 32
  precision: '32-true'

data:
  data_path: 'data/ohlcv_1m/'
  val_split: 0.1
  num_workers: 4
