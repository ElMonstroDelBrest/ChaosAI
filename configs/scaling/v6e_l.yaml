###############################################################################
# v6e-L — ~1B params — Scale-up
#
# Target: v6e-64 (64 chips, 32 GB HBM each = 2048 GB total)
# Auto-Sharder: Mesh 2D Tore 8×8 (data=8, fsdp=8)
# MXU alignment: head_dim = 2048*2/32 = 128 (1 tile MXU parfait)
#
# Chinchilla: 1B × 20 = 20B tokens optimal
# Batch effectif: 128/chip × 64 chips = 8192
# HBM/chip: ~2 GB params bf16 → FSDP-8 = 250 MB/chip params (confortable)
#           Activations: ~2 GB/chip avec remat ≈ 1 GB → < 32 GB sécurisé
# FSDP-8: 1B params = 2 GB bf16 → 250 MB/chip après FSDP-8
# use_remat=true: 24 layers profondes → activations importantes sans remat
###############################################################################

mamba2:
  d_model: 2048          # 16 blocs MXU (2048/128)
  d_state: 16
  n_layers: 24
  n_heads: 32            # head_dim = 2048*2/32 = 128 (1 MXU tile parfait)
  expand_factor: 2       # d_inner = 4096 (32 blocs MXU)
  conv_kernel: 4
  encoder_type: "mamba"
  exo_clock: true
  chunk_size: 128
  use_remat: true         # Sécurité activations — 1B params + 24 layers sur 32 GB HBM

predictor:
  hidden_dim: 4096        # 2× d_model
  n_layers: 2
  dropout: 0.05
  z_dim: 64
  cfm_weight: 1.0
  cfm_n_steps: 2
  cfm_ot: true
  cfm_ot_batch_size: 256

masking:
  mask_ratio: 0.5
  block_size_min: 4
  block_size_max: 16

vicreg:
  inv_weight: 25.0
  var_weight: 25.0
  cov_weight: 1.0
  var_gamma: 1.0

ema:
  tau_start: 0.998        # Plus lent pour gros modèle
  tau_end: 1.0
  anneal_epochs: 200

embedding:
  num_codes: 1024
  codebook_dim: 64
  seq_len: 128

training:
  lr: 7.5e-5              # μP: lr ∝ 1/sqrt(d_model) — plus conservateur à 1B
  weight_decay: 0.05      # Plus fort pour gros modèle
  max_epochs: 100
  warmup_epochs: 15
  batch_size: 8192        # 128/chip × 64 chips
  precision: "bf16"
  grad_clip: 1.0
  n_restarts: 4
  checkpoint_interval: 100  # Plus fréquent sur preemptible v6e

data:
  token_dir: "data/tokens_v5/"
  arrayrecord_dir: "data/arrayrecord/"
  val_split: 0.1
  num_workers: 0
  prefetch_buffer_size: 256
