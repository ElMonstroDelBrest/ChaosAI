###############################################################################
# v5e-S — ~50M params — Quick test
#
# Target: v5e-64 (64 chips, 16 GB HBM each = 1024 GB total)
# Zone: europe-west4-b (même région que GCS → egress gratuit)
# Auto-Sharder: Mesh 2D (data=8, fsdp=8) — tore 2D
# MXU alignment: head_dim = 512*2/8 = 128 (1 tile MXU parfait)
#
# HBM budget 16 GB/chip:
#   Params FSDP-8: ~12 MB/chip | Opt state: ~38 MB/chip
#   Activations: ~128 MB/chip @ batch 64/chip → total ~180 MB → très confortable
###############################################################################

mamba2:
  d_model: 512
  d_state: 16
  n_layers: 16
  n_heads: 8             # head_dim = 512*2/8 = 128
  expand_factor: 2       # d_inner = 1024
  conv_kernel: 4
  encoder_type: "mamba"
  exo_clock: true
  chunk_size: 128
  use_remat: false

predictor:
  hidden_dim: 1024
  n_layers: 2
  dropout: 0.1
  z_dim: 32
  cfm_weight: 0.0
  cfm_n_steps: 2
  cfm_ot: true
  cfm_ot_batch_size: 256

masking:
  mask_ratio: 0.5
  block_size_min: 4
  block_size_max: 8

vicreg:
  inv_weight: 25.0
  var_weight: 25.0
  cov_weight: 1.0
  var_gamma: 1.0

ema:
  tau_start: 0.996
  tau_end: 1.0
  anneal_epochs: 100

embedding:
  num_codes: 1024
  codebook_dim: 64
  seq_len: 128

training:
  lr: 3.0e-4
  weight_decay: 0.01
  max_epochs: 100
  warmup_epochs: 10
  batch_size: 4096        # 64/chip × 64 chips — confortable pour 16 GB
  precision: "bf16"
  grad_clip: 1.0
  n_restarts: 4
  checkpoint_interval: 250

data:
  token_dir: "data/tokens_v5/"
  arrayrecord_dir: "data/arrayrecord/"
  val_split: 0.2
  num_workers: 0
  prefetch_buffer_size: 128
