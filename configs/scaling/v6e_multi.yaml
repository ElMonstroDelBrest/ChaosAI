###############################################################################
# v6e-multi — ~25M params — Multi-source Chinchilla-optimal
#
# Target: v6e-8 → v6e-64 (auto-scale via run_training.py)
# Auto-Sharder: v6e-8 → Mesh (8,1) DP pur | v6e-64 → Mesh (8,8) Tore 2D
# MXU alignment: head_dim = 512*2/8 = 128 (1 tile MXU parfait)
#
# Data: 509M tokens (8650 assets multi-source: crypto 1min + stocks + forex)
# Chinchilla: 25.7M params × 20 = 514M tokens ≈ 509M → ratio 19.8× (optimal)
# 3 epochs with 2 SGDR restarts
#
# Features:
#   - exo_clock_dim=4 (RV, Volume, VIX, CreditSpread)
#   - macro_dim=48 (top-k FRED+COT signals via gated fusion)
#   - gnn_dim=0 (no on-chain data in this run)
#
# Param breakdown:
#   Mamba-2 (12 layers, d=512): ~22M
#   Embedding + Predictor: ~3M
#   Macro projection: ~0.5M
#   Total: ~25.7M
#
# HBM/chip: ~51 MB params bf16 → trivial sur v6e (32 GB HBM/chip)
###############################################################################

mamba2:
  d_model: 512           # 4 blocs MXU (512/128)
  d_state: 16
  n_layers: 12           # 12 layers
  n_heads: 8             # head_dim = 512*2/8 = 128 (1 MXU tile)
  expand_factor: 2       # d_inner = 1024 (8 blocs MXU)
  conv_kernel: 4
  encoder_type: "mamba"
  exo_clock: true
  exo_clock_dim: 4       # [RV, Volume, VIX_zscore, CreditSpread_zscore]
  gnn_dim: 0             # No on-chain embeddings for this run
  macro_dim: 48          # Top-k FRED+COT signals (gated fusion)
  chunk_size: 128
  use_remat: false       # 25.7M = ~51 MB bf16, trivial

predictor:
  hidden_dim: 1024       # 2× d_model
  n_layers: 2
  dropout: 0.1
  z_dim: 32
  cfm_weight: 0.0        # Disable CFM for first multi-source run (stability)
  cfm_n_steps: 2
  cfm_ot: true
  cfm_ot_batch_size: 256

masking:
  mask_ratio: 0.5
  block_size_min: 4
  block_size_max: 8

vicreg:
  inv_weight: 25.0
  var_weight: 25.0
  cov_weight: 1.0
  var_gamma: 1.0

ema:
  tau_start: 0.996
  tau_end: 1.0
  anneal_epochs: 100

embedding:
  num_codes: 1024
  codebook_dim: 64
  seq_len: 128

training:
  lr: 3.0e-4
  weight_decay: 0.02
  max_epochs: 3
  warmup_epochs: 1       # 1 epoch warmup (~7770 steps), NOT 5 (would exceed total)
  batch_size: 4096       # auto-scales: v6e-8 → 512 (64/chip)
  precision: "bf16"
  grad_clip: 1.0
  n_restarts: 2
  checkpoint_interval: 1000

data:
  token_dir: "data/tokens_multi/"
  arrayrecord_dir: "data/arrayrecord_multi/"
  val_split: 0.1
  num_workers: 0
  prefetch_buffer_size: 128
