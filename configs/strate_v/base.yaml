###############################################################################
# Strate V — GNN On-Chain (GraphSAGE + GATv2)
#
# Model: ~450K params
# Training: self-supervised (link prediction + contrastive + flow)
# Data: BigQuery public datasets (BTC + ETH transactions)
###############################################################################

graph:
  node_features: 8
  edge_features: 2
  max_nodes: 50000
  k_hop: 2
  chains:
    - btc
    - eth

model:
  hidden_dim: 128
  gnn_dim: 256          # MXU-aligned: 2 x 128
  n_layers: 3
  gat_heads: 4
  dropout: 0.1
  pool_type: "mean_max_attn"

training:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  max_epochs: 50
  warmup_epochs: 5
  batch_size: 32
  precision: "16-mixed"
  link_weight: 1.0
  contrastive_weight: 0.5
  flow_weight: 0.1
  temperature: 0.07
  neg_samples: 16

bigquery:
  project: "bigquery-public-data"
  btc_dataset: "crypto_bitcoin"
  eth_dataset: "crypto_ethereum"
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  max_bytes_billed: 1000000000000
