###############################################################################
# Strate IV — Dual-Encoder Macro/Micro TD-MPC2
#
# Dual frozen JEPA encoders (micro 1min + macro 1h) → late fusion
# obs_dim = 1536 + 1536 + 5 + 5 + 1 + 5 + 1 = 3089
# Offline training on pre-computed replay buffer
# Target: TPU v6e-8 (8 chips, single-device training)
###############################################################################

strate_iv:
  # Dual-encoder dimensions
  micro_emb_dim: 1536       # 2 × 768 (mean + last pooling)
  macro_emb_dim: 1536       # 2 × 768 (mean + last pooling)
  n_convergence_features: 5
  cross_tf_features: 1
  revin_features: 5
  return_features: 1

  # Multiverse
  n_multiverses: 5
  perturbation_sigma: 0.01

  # World model (scaled up for obs_dim=3089)
  latent_dim: 256
  hidden_dim: 512
  n_layers: 3

  # Critic
  n_quantiles: 32
  cvar_alpha_min: 0.1
  cvar_alpha_max: 0.4

  # RL
  gamma: 0.99
  lr: 0.0003
  ema_tau: 0.005
  max_grad_norm: 10.0

  # Training
  batch_size: 256
  buffer_capacity: 200000
  warmup_steps: 1000
  update_freq: 1

  # Planning (MPPI)
  use_planning: true
  plan_horizon: 5
  plan_samples: 512
  plan_iters: 6
  plan_temperature: 0.5
  plan_init_std: 0.5

  # CQL regularization
  cql_alpha: 1.0
  cql_n_random: 10

  # Transaction cost
  tc_rate: 0.0008
